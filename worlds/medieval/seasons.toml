# Medieval World — Season Definitions
# Order matters: seasons cycle in the order defined here.

# ---- Global season thresholds ----
# Systems compare per-season heatDrainMod / productionMod against these breakpoints.
# Modders can tune these to change when visual tints, schedule contractions,
# and migration penalties kick in.
#
# Compile-time defaults live in WorldSchema.h (DEFAULT_HARSH_COLD, etc.).
# If you omit a key below, the loader falls back to that constant.

# Heat-drain thresholds (compared against SeasonDef::heatDrainMod)
harsh_cold    = 0.8    # winter-like: schedule contraction, migration penalty, icy-blue sky tint  (DEFAULT_HARSH_COLD)
moderate_cold = 0.3    # autumn-like: amber/orange sky tint                                       (DEFAULT_MODERATE_COLD)
cold_season   = 0.2    # wood becomes essential heating fuel                                      (DEFAULT_COLD_SEASON)
mild_cold     = 0.05   # spring-like: slight green sky tint                                       (DEFAULT_MILD_COLD)

# Production-mod thresholds (compared against SeasonDef::productionMod)
harvest_season = 1.1   # high-production: more frequent work shanties, harvest shanty song variant (DEFAULT_HARVEST_SEASON)
low_production = 0.5   # scarce-output: reduced yields                                            (DEFAULT_LOW_PRODUCTION)

[[seasons]]
name             = "Spring"
display_name     = "Spring"
duration_days    = 30
production_mod   = 0.8      # growth season, moderate output
energy_drain_mod = 1.0
heat_drain_mod   = 0.15     # mild cold
base_temperature = 12.0     # noon °C
temp_swing       = 8.0      # ± degrees from diurnal cycle
# Per-resource price floor multipliers (× PRICE_MIN 0.5)
# Wood: 0.5 + 4.5×0.15 = 1.175 → mult 2.35; Food: prod 0.8 ≥ 0.5 → floor 1.0 → mult 2.0; Water: no seasonal variation
[seasons.price_floors]
Food  = 2.0
Water = 1.0
Wood  = 2.35

[[seasons]]
name             = "Summer"
display_name     = "Summer"
duration_days    = 30
production_mod   = 1.0      # peak production
energy_drain_mod = 1.0
heat_drain_mod   = 0.0      # no cold
base_temperature = 28.0
temp_swing       = 8.0
# No heating demand, good production — all floors at baseline
[seasons.price_floors]
Food  = 2.0
Water = 1.0
Wood  = 1.0

[[seasons]]
name             = "Autumn"
display_name     = "Autumn"
duration_days    = 30
production_mod   = 1.2      # harvest bonus
energy_drain_mod = 1.0
heat_drain_mod   = 0.4      # moderate cold
base_temperature = 8.0
temp_swing       = 8.0
# Wood: 0.5 + 4.5×0.4 = 2.3 → mult 4.6; Food: prod 1.2 ≥ 0.5 → floor 1.0 → mult 2.0
[seasons.price_floors]
Food  = 2.0
Water = 1.0
Wood  = 4.6

[[seasons]]
name             = "Winter"
display_name     = "Winter"
duration_days    = 30
production_mod   = 0.2      # very low production
energy_drain_mod = 1.8      # exhausting cold
heat_drain_mod   = 1.0      # full cold drain
base_temperature = -8.0
temp_swing       = 8.0
# Wood: 0.5 + 4.5×1.0 = 5.0 → mult 10.0; Food: prod 0.2 < 0.5 → floor 2.0 → mult 4.0
[seasons.price_floors]
Food  = 4.0
Water = 1.0
Wood  = 10.0

# Medieval World — Random Event Definitions
# These define the stochastic events that RandomEventSystem can trigger.
# Each event specifies its effect type, value, duration, and additional behaviors.

# ---- Core events (always eligible) ----

[[events]]
name               = "Drought"
display_name       = "Drought"
effect_type        = "production_modifier"
effect_value       = 0.2
duration_hours     = 8.0
chance             = 0.01
min_population     = 0
morale_impact      = -0.10
rumour_type        = "DroughtNearby"
rumour_seeds       = 2
triggers_solidarity = true
solidarity_boost   = 0.03
log_message        = "DROUGHT strikes {settlement} ({duration}h) {pop_tag}"

